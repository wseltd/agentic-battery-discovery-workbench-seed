[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentic-discovery-core"
version = "0.1.0"
description = "Shared infrastructure for agentic scientific discovery workbenches"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "pydantic",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.setuptools.packages.find]
where = ["src"]
