[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentic-materials-discovery-workbench"
version = "0.1.0"
description = "Agentic inorganic crystalline materials discovery workbench — generate, relax, validate, and rank crystal structure candidates"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "pymatgen>=2024.1.1",
    "ase>=3.23.0",
    "numpy>=1.24",
    "agentic-discovery-core",
]

[project.optional-dependencies]
mattergen = ["mattergen"]
mattersim = ["mattersim"]
mp-api = ["mp-api>=0.39.0"]
dev = [
    "pytest>=7.0",
    "pytest-cov",
]

[tool.setuptools.packages.find]
where = ["src"]
